  - id: 0ab0427b-d5ce-4651-9bcd-96607dc04d50
    at: 2026-07-23T21:50:29.637Z
    actor: opencode-MiniMax-M3
    stage: verify
    attempt: 1
    type: stage-returned
    to_stage: plan
    reason: "improve (semantic — contract defect): the rename introduces a hard backward-incompatibility for historical change records. src/change/model.ts:62 validates STAGES.includes(event.stage) and src/change/model.ts:108 pins the close event to type change-closed / stage close; the new STAGES = [plan, review, apply, verify, close] no longer includes finalize. The terminal tag codepatrol/committed/2026-07-23-finalize-merge carries a change record whose events still use stage: finalize (event id ad39cd36-9745-4ee7-86ca-a0e55ddfe45e and others), so every codepatrol change inspect / change doctor / change session / codepatrol status invocation in the workspace now throws CHANGE_INVALID: Event ad39cd36-… has invalid actor, stage or attempt. Spec §Compatibility and rollout mis-stated the compatibility boundary as on-disk finalize/ directories only and did not address stage/type literals inside historical change.yaml records. This Verify session could not formally project this work-id because the inspector iterates affected historical refs; the projection was inferred from change.yaml and corroborated by the state machine accepting a Verify begin. Apply is structurally complete (38 declared paths, 38 produced in diff; tsc clean; 127/127 tests; lint-skills/contract tests/smoke-cli/graph-find finalize all green) and the surface work is sound, so the fix is design-level not implementation-level: add a backward-compat normalization shim in foldChange (model.ts) that accepts stage finalize|close and type change-finalized|change-closed and normalizes to the canonical close/change-closed, without mutating immutable historical records. Sibling review codepatrol/2026-07-23-rename-finalize-stage-to-close raised the exact same finding (change.yaml:77, citing model.ts:62 and :108) which was not carried into this Changes Plan attempts. Required correction: open a new Plan attempt with T0/T2a targeting model.ts foldChange normalization, update spec §Compatibility and rollout, and provide codepatrol change inspect --id 2026-07-23-rename-finalize-to-close as evidence that the inspector projection resumes. See verify/report.md."
    next_action: codepatrol-plan 2026-07-23-rename-finalize-to-close on codepatrol/2026-07-23-rename-finalize-to-close
